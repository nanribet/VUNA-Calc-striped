name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vuna-calc:latest
          outputs: type=docker,dest=/tmp/vuna-calc.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuna-calc-image
          path: /tmp/vuna-calc.tar

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: vuna-calc-image
          path: /tmp

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: /tmp/vuna-calc.tar
          target: /tmp

      - name: Load and run image on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker load -i /tmp/vuna-calc.tar
            docker stop vuna-calc || true
            docker rm vuna-calc || true
            docker run -d --name vuna-calc --restart unless-stopped -p 80:80 vuna-calc:latest
            docker image prune -f
